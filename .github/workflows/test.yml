name: Run Container and Execute Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-in-container:
    runs-on: [self-hosted, cx-build]
    container:
      image: localhost:5000/flagscale:cuda12.8.1-cudnn9.7.1-python3.12-torch2.7.0-time2507111538
      options: --gpus all --privileged --ipc=host --ulimit memlock=-1 --ulimit stack=67108864

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          ssh-strict: true
          ssh-user: git
          persist-credentials: true
          clean: true
          sparse-checkout-cone-mode: true
          fetch-tags: false
          show-progress: true
          lfs: false
          submodules: true
          set-safe-directory: true

      - name: Set up Python and Install Dependencies
        run: |
          apt update -y
          apt-get install -y python3 python3-pip python3-venv git
          python3 -m venv venv
          . venv/bin/activate
          cd /__w/SDCCL/SDCCL
          git config --global --add safe.directory /__w/SDCCL/SDCCL
          pip install setuptools pre-commit -i https://pypi.tuna.tsinghua.edu.cn/simple
          pre-commit install

      - name: Run Code Format Check with pre-commit
        run: |
          cd /__w/SDCCL/SDCCL
          . venv/bin/activate
          apt update -y
          apt-get install clang-format -y
          git fetch --all
          if [ -n "$GITHUB_HEAD_REF" ] && [ -n "$GITHUB_BASE_REF" ]; then
            from_ref="origin/$GITHUB_HEAD_REF"
            to_ref="origin/$GITHUB_BASE_REF"
            echo "From reference: $from_ref; To reference: $to_ref"
            pre-commit run --from-ref "$from_ref" --to-ref "$to_ref"
          fi
        continue-on-error: false

      - name: Check the current working directory
        run: |
          echo "Current directory: $(pwd)"
          ls -l ./test/script

      - name: Ensure script has execute permissions
        run: chmod +x /__w/SDCCL/SDCCL/test/script/auto_script.sh

      - name: Run Auto Test Script in Container
        run: |
          cd /__w/SDCCL/SDCCL
          ./test/script/auto_script.sh

